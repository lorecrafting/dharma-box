<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>法寶匣 · 淨土大經科註</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600;700&display=swap');

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --gold: #c9a84c;
      --gold-light: #e8c97a;
      --bg: #0d0d12;
      --surface: #16161f;
      --surface2: #1e1e2a;
      --text: #ede0c8;
      --text-dim: #8a7d68;
      --accent: #7b5ea7;
      --red: #c0392b;
    }

    html, body {
      height: 100%;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: 'Noto Serif TC', 'PingFang TC', 'Heiti TC', serif;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }

    /* ── Layout ─────────────────────────────────────────── */
    #app {
      display: flex;
      flex-direction: column;
      height: 100vh;
      max-height: 100vh;
    }

    /* ── Top bar ─────────────────────────────────────────── */
    #topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 16px;
      background: var(--surface);
      border-bottom: 1px solid rgba(201,168,76,0.2);
      flex-shrink: 0;
      min-height: 48px;
    }

    #lecture-counter {
      font-size: 14px;
      color: var(--gold);
      letter-spacing: 0.05em;
      font-weight: 600;
    }

    #progress-track {
      flex: 1;
      margin: 0 16px;
      height: 4px;
      background: var(--surface2);
      border-radius: 2px;
      overflow: hidden;
    }

    #progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--gold), var(--gold-light));
      border-radius: 2px;
      transition: width 0.4s ease;
    }

    /* Secret admin tap zone */
    #admin-tap {
      width: 44px;
      height: 44px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 8px;
    }
    #admin-tap:active { background: rgba(255,255,255,0.05); }

    /* ── Player ──────────────────────────────────────────── */
    #player-wrap {
      flex: 1;
      position: relative;
      background: #000;
      min-height: 0;
    }

    #player-wrap iframe,
    #player-wrap #youtube-player {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      border: none;
    }


    /* ── Bottom info + controls ──────────────────────────── */
    #bottom {
      background: var(--surface);
      border-top: 1px solid rgba(201,168,76,0.2);
      flex-shrink: 0;
      padding: 10px 16px 14px;
    }

    #lecture-title {
      font-size: 15px;
      color: var(--text);
      text-align: center;
      margin-bottom: 4px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      letter-spacing: 0.04em;
    }

    #lecture-duration {
      font-size: 12px;
      color: var(--text-dim);
      text-align: center;
      margin-bottom: 12px;
    }

    #nav-row {
      display: flex;
      gap: 12px;
      align-items: center;
    }

    .nav-btn {
      flex: 1;
      padding: 14px 0;
      border: none;
      border-radius: 10px;
      font-family: inherit;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      letter-spacing: 0.08em;
      transition: opacity 0.15s, transform 0.1s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .nav-btn:active { opacity: 0.75; transform: scale(0.97); }
    .nav-btn:disabled { opacity: 0.3; cursor: default; }

    #btn-prev {
      background: var(--surface2);
      color: var(--text);
      border: 1px solid rgba(255,255,255,0.08);
    }
    #btn-prev svg { fill: var(--text); }

    #btn-next {
      background: linear-gradient(135deg, #8a6fc9, #5a3e8a);
      color: #fff;
    }
    #btn-next svg { fill: #fff; }

    .btn-icon { width: 20px; height: 20px; flex-shrink: 0; }

    /* ── Admin PIN modal ─────────────────────────────────── */
    #modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.85);
      z-index: 1000;
      align-items: center;
      justify-content: center;
    }
    #modal-overlay.open { display: flex; }

    #modal-box {
      background: var(--surface);
      border: 1px solid rgba(201,168,76,0.4);
      border-radius: 16px;
      padding: 32px 28px;
      width: min(340px, 90vw);
      text-align: center;
    }

    #modal-box h2 {
      font-size: 18px;
      color: var(--gold);
      margin-bottom: 8px;
      letter-spacing: 0.05em;
    }

    #modal-box p {
      font-size: 13px;
      color: var(--text-dim);
      margin-bottom: 20px;
    }

    #pin-display {
      font-size: 28px;
      letter-spacing: 0.3em;
      color: var(--text);
      background: var(--bg);
      border-radius: 8px;
      padding: 10px 16px;
      margin-bottom: 20px;
      min-height: 52px;
    }

    #pin-error {
      color: var(--red);
      font-size: 13px;
      margin-bottom: 12px;
      min-height: 18px;
    }

    .pin-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-bottom: 16px;
    }

    .pin-key {
      background: var(--surface2);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 10px;
      padding: 16px;
      font-size: 20px;
      font-family: inherit;
      color: var(--text);
      cursor: pointer;
      transition: background 0.12s;
    }
    .pin-key:active { background: rgba(201,168,76,0.15); }
    .pin-key.wide { grid-column: span 2; }
    .pin-key.del { color: var(--text-dim); font-size: 16px; }

    #modal-cancel {
      background: none;
      border: none;
      color: var(--text-dim);
      font-size: 14px;
      font-family: inherit;
      cursor: pointer;
      padding: 8px;
    }

    /* ── Toast ───────────────────────────────────────────── */
    #toast {
      position: fixed;
      bottom: 80px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: rgba(0,0,0,0.85);
      color: var(--gold);
      padding: 10px 20px;
      border-radius: 20px;
      font-size: 14px;
      opacity: 0;
      transition: opacity 0.3s, transform 0.3s;
      pointer-events: none;
      z-index: 500;
      white-space: nowrap;
    }
    #toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* ── Loading screen ──────────────────────────────────── */
    #loading {
      position: fixed;
      inset: 0;
      background: var(--bg);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 900;
      gap: 20px;
      transition: opacity 0.6s;
    }
    #loading.hidden { opacity: 0; pointer-events: none; }

    #loading .logo {
      font-size: 48px;
      line-height: 1;
    }
    #loading .title {
      font-size: 22px;
      color: var(--gold);
      letter-spacing: 0.12em;
    }
    #loading .subtitle {
      font-size: 13px;
      color: var(--text-dim);
      letter-spacing: 0.08em;
    }
    .spinner {
      width: 32px;
      height: 32px;
      border: 3px solid rgba(201,168,76,0.2);
      border-top-color: var(--gold);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-top: 12px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>

<!-- Loading screen -->
<div id="loading">
  <div class="logo">🪷</div>
  <div class="title">法寶匣</div>
  <div class="subtitle">淨空老法師 · 二零一四淨土大經科註</div>
  <div class="spinner"></div>
</div>

<!-- Main app -->
<div id="app">

  <!-- Top bar -->
  <div id="topbar">
    <span id="lecture-counter">第 1 講</span>
    <div id="progress-track">
      <div id="progress-fill" style="width:0%"></div>
    </div>
    <div id="admin-tap" title=""></div>
  </div>

  <!-- Video player -->
  <div id="player-wrap">
    <div id="youtube-player"></div>
  </div>

  <!-- Bottom controls -->
  <div id="bottom">
    <div id="lecture-title">載入中…</div>
    <div id="lecture-duration"></div>
    <div id="nav-row">
      <button class="nav-btn" id="btn-prev">
        <svg class="btn-icon" viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6 8.5 6V6z"/></svg>
        上一講
      </button>
      <button class="nav-btn" id="btn-next">
        下一講
        <svg class="btn-icon" viewBox="0 0 24 24"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg>
      </button>
    </div>
  </div>

</div>

<!-- Admin PIN modal -->
<div id="modal-overlay">
  <div id="modal-box">
    <h2>管理員驗證</h2>
    <p>請輸入四位密碼</p>
    <div id="pin-display">····</div>
    <div id="pin-error"></div>
    <div class="pin-grid">
      <button class="pin-key" data-k="1">1</button>
      <button class="pin-key" data-k="2">2</button>
      <button class="pin-key" data-k="3">3</button>
      <button class="pin-key" data-k="4">4</button>
      <button class="pin-key" data-k="5">5</button>
      <button class="pin-key" data-k="6">6</button>
      <button class="pin-key" data-k="7">7</button>
      <button class="pin-key" data-k="8">8</button>
      <button class="pin-key" data-k="9">9</button>
      <button class="pin-key wide" data-k="0">0</button>
      <button class="pin-key del" id="pin-del">⌫</button>
    </div>
    <button id="modal-cancel">取消</button>
  </div>
</div>

<!-- Toast -->
<div id="toast"></div>

const ADMIN_PIN = '8888'; // Change this to your preferred PIN
const SAVE_KEY  = 'dharmabox_idx';

// ── State ─────────────────────────────────────────────────
let player        = null;
let currentIdx    = 0;
let playerReady   = false;
let adminTapCount = 0;
let adminTapTimer = null;
let pinBuffer    = '';

// ── Restore saved position ────────────────────────────────
function loadSavedIdx() {
  try {
    const v = parseInt(localStorage.getItem(SAVE_KEY), 10);
    if (!isNaN(v) && v >= 0 && v < PLAYLIST.length) return v;
  } catch(e) {}
  return 0;
}
function saveIdx(i) {
  try { localStorage.setItem(SAVE_KEY, String(i)); } catch(e) {}
}

// ── YouTube IFrame API ────────────────────────────────────
function onYouTubeIframeAPIReady() {
  currentIdx = loadSavedIdx();
  player = new YT.Player('youtube-player', {
    height: '100%',
    width: '100%',
    videoId: PLAYLIST[currentIdx].id,
    playerVars: {
      autoplay: 1,
      controls: 1,
      iv_load_policy: 3,  // no annotations
      modestbranding: 1,
      rel: 0,
      playsinline: 1,
    },
    events: {
      onReady: onPlayerReady,
      onStateChange: onPlayerStateChange,
      onError: onPlayerError,
    }
  });
}

function onPlayerReady(event) {
  playerReady = true;
  updateUI();
  hideLoading();
  event.target.playVideo();
}

function onPlayerStateChange(event) {
  if (event.data === YT.PlayerState.ENDED) {
    goNext();
  }
}

function onPlayerError(event) {
  showToast('影片載入失敗，跳至下一講');
  setTimeout(goNext, 2000);
}

// ── Navigation ────────────────────────────────────────────
function goTo(idx, autoplay) {
  if (idx < 0 || idx >= PLAYLIST.length) return;
  currentIdx = idx;
  saveIdx(currentIdx);
  updateUI();
  if (player && playerReady) {
    if (autoplay !== false) {
      player.loadVideoById(PLAYLIST[currentIdx].id);
    } else {
      player.cueVideoById(PLAYLIST[currentIdx].id);
    }
  }
}

function goPrev() {
  if (currentIdx > 0) goTo(currentIdx - 1);
  else showToast('已是第一講');
}

function goNext() {
  if (currentIdx < PLAYLIST.length - 1) goTo(currentIdx + 1);
  else showToast('已到最後一講 🙏');
}

// ── UI Updates ────────────────────────────────────────────
function updateUI() {
  const item = PLAYLIST[currentIdx];
  const num  = currentIdx + 1;
  const total = PLAYLIST.length;

  document.getElementById('lecture-counter').textContent = `第 ${num} 講 / 共 ${total} 講`;
  document.getElementById('lecture-title').textContent   = item.title;
  document.getElementById('lecture-duration').textContent = item.duration ? `時長：${item.duration}` : '';
  document.getElementById('progress-fill').style.width   = `${(num / total) * 100}%`;

  document.getElementById('btn-prev').disabled = currentIdx === 0;
  document.getElementById('btn-next').disabled = currentIdx === total - 1;
  document.title = `${item.title} · 法寶匣`;
}

function hideLoading() {
  const el = document.getElementById('loading');
  el.classList.add('hidden');
  setTimeout(() => el.remove(), 700);
}

// ── Bottom nav buttons ────────────────────────────────────
document.getElementById('btn-prev').addEventListener('click', goPrev);
document.getElementById('btn-next').addEventListener('click', goNext);

// ── Admin tap (top-right corner, 5 quick taps) ────────────
document.getElementById('admin-tap').addEventListener('click', () => {
  adminTapCount++;
  clearTimeout(adminTapTimer);
  adminTapTimer = setTimeout(() => { adminTapCount = 0; }, 2000);
  if (adminTapCount >= 5) {
    adminTapCount = 0;
    openPinModal();
  }
});

// ── PIN modal ─────────────────────────────────────────────
function openPinModal() {
  pinBuffer = '';
  document.getElementById('pin-display').textContent = '····';
  document.getElementById('pin-error').textContent = '';
  document.getElementById('modal-overlay').classList.add('open');
}

function closePinModal() {
  document.getElementById('modal-overlay').classList.remove('open');
  pinBuffer = '';
}

function updatePinDisplay() {
  const filled = '●'.repeat(pinBuffer.length);
  const empty  = '·'.repeat(Math.max(0, 4 - pinBuffer.length));
  document.getElementById('pin-display').textContent = filled + empty;
}

document.querySelectorAll('.pin-key[data-k]').forEach(btn => {
  btn.addEventListener('click', () => {
    if (pinBuffer.length >= 4) return;
    pinBuffer += btn.dataset.k;
    updatePinDisplay();
    if (pinBuffer.length === 4) {
      setTimeout(checkPin, 200);
    }
  });
});

document.getElementById('pin-del').addEventListener('click', () => {
  pinBuffer = pinBuffer.slice(0, -1);
  updatePinDisplay();
  document.getElementById('pin-error').textContent = '';
});

document.getElementById('modal-cancel').addEventListener('click', closePinModal);

function checkPin() {
  if (pinBuffer === ADMIN_PIN) {
    closePinModal();
    showAdminMenu();
  } else {
    document.getElementById('pin-error').textContent = '密碼錯誤，請再試一次';
    pinBuffer = '';
    updatePinDisplay();
  }
}

// ── Admin menu (after PIN) ────────────────────────────────
function showAdminMenu() {
  const choice = window.prompt(
    '管理員選單\n\n' +
    '輸入數字選擇：\n' +
    '1 - 跳至指定講次\n' +
    '2 - 重新從第一講開始\n' +
    '3 - 關閉此選單'
  );
  if (choice === '1') {
    const n = parseInt(window.prompt(`請輸入講次 (1–${PLAYLIST.length})：`), 10);
    if (!isNaN(n) && n >= 1 && n <= PLAYLIST.length) {
      goTo(n - 1);
      showToast(`已跳至第 ${n} 講`);
    }
  } else if (choice === '2') {
    goTo(0);
    showToast('已重新從第一講開始');
  }
}

// ── Toast ─────────────────────────────────────────────────
let toastTimer = null;
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2800);
}

// ── Prevent context menu / long-press menu ────────────────
document.addEventListener('contextmenu', e => e.preventDefault());
document.addEventListener('selectstart', e => e.preventDefault());

// ── Load YouTube IFrame API ───────────────────────────────
const tag = document.createElement('script');
tag.src = 'https://www.youtube.com/iframe_api';
document.head.appendChild(tag);
</script>
